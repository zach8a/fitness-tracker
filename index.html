<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Fitness Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0d0d1a;
      --card: rgba(255,255,255,0.07);
      --card-solid: #16163a;
      --border: rgba(255,255,255,0.12);
      --text: #f0f0ff;
      --muted: rgba(255,255,255,0.45);
      --purple: #c084fc;
      --pink: #f472b6;
      --blue: #60a5fa;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --grad1: linear-gradient(135deg, #1d4ed8, #dc2626);
      --grad2: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --grad3: linear-gradient(135deg, #10b981, #3b82f6);
      --grad4: linear-gradient(135deg, #f59e0b, #ef4444);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse at top left, rgba(29,78,216,0.3) 0%, transparent 50%),
                        radial-gradient(ellipse at bottom right, rgba(220,38,38,0.25) 0%, transparent 50%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #1d4ed8 0%, #dc2626 100%);
      padding: 22px 20px 18px;
      position: relative;
      overflow: hidden;
    }
    header::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    header h1 { font-size: 1.5rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    header p { font-size: 0.78rem; color: rgba(255,255,255,0.75); margin-top: 3px; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      backdrop-filter: blur(10px);
    }
    .tab {
      padding: 8px 18px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }
    .tab:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
    .tab.active {
      background: var(--grad1);
      border-color: transparent;
      color: #fff;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(29,78,216,0.45);
    }

    /* Container */
    .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

    /* Section */
    .section { display: none; }
    .section.active { display: block; }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 14px;
      backdrop-filter: blur(12px);
    }
    .card-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 16px;
      background: var(--grad1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Form */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
    input, select {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 9px 12px;
      font-size: 0.85rem;
      outline: none;
      transition: all .2s;
      width: 100%;
    }
    input:focus, select:focus {
      border-color: #1d4ed8;
      background: rgba(29,78,216,0.08);
      box-shadow: 0 0 0 3px rgba(29,78,216,0.15);
    }
    select option { background: #1a1a3e; color: var(--text); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    .btn {
      padding: 10px 22px;
      border-radius: 10px;
      border: none;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-blue {
      background: var(--grad1);
      color: #fff;
      box-shadow: 0 4px 15px rgba(124,58,237,0.35);
    }
    .btn-blue:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(220,38,38,0.5); }
    .btn-red {
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--red);
      padding: 5px 11px;
      font-size: 0.75rem;
      border-radius: 8px;
    }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      color: var(--muted);
      font-weight: 700;
      text-align: left;
      padding: 7px 10px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 10px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.04); }

    /* Stats row */
    .stats-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .stat-box {
      border-radius: 14px;
      padding: 14px 16px;
      flex: 1;
      min-width: 90px;
      position: relative;
      overflow: hidden;
    }
    .stat-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      padding: 1px;
      background: var(--grad1);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
    .stat-box-inner { background: rgba(255,255,255,0.05); border-radius: 13px; padding: 14px 16px; margin: -14px -16px; }
    .stat-lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; font-weight: 600; }
    .stat-val { font-size: 1.3rem; font-weight: 800; }

    /* Progress bar */
    .prog-bar { background: rgba(255,255,255,0.08); border-radius: 6px; height: 8px; margin-top: 6px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 6px; transition: width .4s ease; }
    .macro-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 0.83rem; }
    .macro-row .macro-lbl { color: var(--muted); font-size: 0.73rem; font-weight: 600; }

    /* Meals list */
    .meal-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .meal-item:last-child { border-bottom: none; }
    .meal-name { font-size: 0.9rem; font-weight: 600; }
    .meal-macros { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
    .meal-cal { font-size: 0.95rem; font-weight: 800; background: var(--grad4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* PR board */
    .pr-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .pr-item:last-child { border-bottom: none; }
    .pr-name { font-size: 0.9rem; font-weight: 500; }
    .pr-weight { font-size: 1.05rem; font-weight: 800; background: var(--grad2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Chart container */
    .chart-wrap { position: relative; height: 220px; margin-top: 6px; }

    /* Goals form */
    .goals-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .goals-row .form-group { flex: 1; min-width: 80px; }

    /* Set rows */
    .set-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .set-label { font-size: 0.78rem; font-weight: 700; color: var(--purple); min-width: 44px; }
    .set-row input { flex: 1; }

    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-dow { text-align: center; font-size: 0.55rem; font-weight: 700; color: var(--muted); text-transform: uppercase; padding: 2px 0; }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 0.55rem;
      font-weight: 700;
    }
    .cal-day.empty { background: transparent; }
    .cal-day.future { background: rgba(255,255,255,0.03); color: var(--muted); }
    .cal-day.did-workout { background: rgba(52,211,153,0.18); border: 1px solid rgba(52,211,153,0.35); color: var(--green); }
    .cal-day.rest-day { background: rgba(96,165,250,0.12); border: 1px solid rgba(96,165,250,0.3); color: var(--blue); }
    .cal-day.no-workout { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--red); }
    .cal-day.is-today { border: 1px solid #1d4ed8 !important; box-shadow: 0 0 6px rgba(29,78,216,0.5); }
    .cal-day .cal-num { font-size: 0.55rem; line-height: 1; }
    .cal-day .cal-icon { font-size: 0.6rem; line-height: 1; }

    /* Empty state */
    .empty { text-align: center; color: var(--muted); padding: 32px 0; font-size: 0.85rem; }

    @media (max-width: 500px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
      header h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <h1><i class="fa-solid fa-dumbbell" style="margin-right:8px;"></i>Fitness Tracker</h1>
  <p id="header-date"></p>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('workout')"><i class="fa-solid fa-dumbbell"></i> Workout</button>
  <button class="tab" onclick="switchTab('body')"><i class="fa-solid fa-weight-scale"></i> Body Stats</button>
  <button class="tab" onclick="switchTab('nutrition')"><i class="fa-solid fa-utensils"></i> Nutrition</button>
  <button class="tab" onclick="switchTab('progress')"><i class="fa-solid fa-chart-line"></i> Progress</button>
</div>

<div class="container">

  <!-- ── WORKOUT ── -->
  <div id="tab-workout" class="section active">

    <!-- Top row: calendar + streak -->
    <div style="display:flex;gap:12px;margin-bottom:14px;">

      <!-- Compact calendar -->
      <div class="card" style="flex:1;padding:12px 14px;margin-bottom:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--grad1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Calendar</span>
          <div style="display:flex;gap:4px;align-items:center;">
            <button onclick="calNav(-1)" style="background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:1px 7px;cursor:pointer;font-size:0.85rem;line-height:1.6;">‹</button>
            <span id="cal-month-label" style="font-size:0.65rem;font-weight:700;min-width:72px;text-align:center;"></span>
            <button onclick="calNav(1)" style="background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:1px 7px;cursor:pointer;font-size:0.85rem;line-height:1.6;">›</button>
          </div>
        </div>
        <div id="calendar-grid"></div>
      </div>

      <!-- Streak panel -->
      <div class="card" style="flex:1;padding:12px 14px;margin-bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:6px;">
        <div style="font-size:1.6rem;line-height:1;" id="streak-fire"><i class="fa-solid fa-fire" style="color:#ea580c;"></i></div>
        <div id="streak-count" style="font-size:1.4rem;font-weight:800;background:var(--grad1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">0</div>
        <div style="font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;">Day Streak</div>
        <button id="rest-day-btn" onclick="logRestDay()" style="margin-top:6px;background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.3);color:var(--blue);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:0.72rem;font-weight:700;width:100%;"><i class="fa-solid fa-bed"></i> Log Rest Day</button>
        <div style="display:flex;gap:8px;font-size:0.6rem;color:var(--muted);">
          <span><span style="color:var(--green)">✓</span> workout</span>
          <span><span style="color:var(--blue)">𝗥</span> rest</span>
          <span><span style="color:var(--red)">✕</span> missed</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Log Exercise</div>
      <div class="form-grid">
        <div class="form-group" style="grid-column: span 2">
          <label>Exercise</label>
          <select id="w-name" onchange="toggleCustomExercise()">
            <option value="">— Select Exercise —</option>
            <optgroup label="Chest">
              <option>Bench Press</option>
              <option>Incline Bench Press</option>
              <option>Decline Bench Press</option>
              <option>Dumbbell Fly</option>
              <option>Cable Fly</option>
              <option>Push-Up</option>
            </optgroup>
            <optgroup label="Back">
              <option>Deadlift</option>
              <option>Pull-Up</option>
              <option>Lat Pulldown</option>
              <option>Bent Over Row</option>
              <option>Seated Cable Row</option>
              <option>T-Bar Row</option>
            </optgroup>
            <optgroup label="Shoulders">
              <option>Overhead Press</option>
              <option>Dumbbell Shoulder Press</option>
              <option>Lateral Raise</option>
              <option>Front Raise</option>
              <option>Face Pull</option>
              <option>Arnold Press</option>
            </optgroup>
            <optgroup label="Arms">
              <option>Barbell Curl</option>
              <option>Dumbbell Curl</option>
              <option>Hammer Curl</option>
              <option>Tricep Pushdown</option>
              <option>Skull Crusher</option>
              <option>Dips</option>
            </optgroup>
            <optgroup label="Legs">
              <option>Squat</option>
              <option>Leg Press</option>
              <option>Romanian Deadlift</option>
              <option>Leg Curl</option>
              <option>Leg Extension</option>
              <option>Calf Raise</option>
              <option>Lunges</option>
              <option>Hip Thrust</option>
            </optgroup>
            <optgroup label="Core">
              <option>Plank</option>
              <option>Crunch</option>
              <option>Hanging Leg Raise</option>
              <option>Cable Crunch</option>
              <option>Russian Twist</option>
            </optgroup>
            <optgroup label="Cardio">
              <option>Treadmill</option>
              <option>Elliptical</option>
              <option>Bike</option>
              <option>Stair Climber</option>
              <option>Jump Rope</option>
            </optgroup>
            <option value="__custom__">Other (type my own)</option>
          </select>
        </div>
        <div class="form-group" id="custom-exercise-group" style="grid-column: span 2; display:none">
          <label>Custom Exercise Name</label>
          <input id="w-name-custom" type="text" placeholder="Enter exercise name">
        </div>
        <!-- Strength: sets count + build button -->
        <div class="form-group" id="w-sets-group">
          <label>Number of Sets</label>
          <input id="w-sets" type="number" placeholder="3" min="1" max="10">
        </div>
        <div class="form-group" id="w-sets-btn-group" style="justify-content: flex-end;">
          <label>&nbsp;</label>
          <button class="btn btn-blue" type="button" onclick="buildSetRows()" style="white-space:nowrap">Build Sets</button>
        </div>
        <!-- Cardio fields -->
        <div class="form-group" id="w-duration-group" style="display:none">
          <label>Duration (min)</label>
          <input id="w-duration" type="number" placeholder="30" min="1">
        </div>
        <div class="form-group" id="w-distance-group" style="display:none">
          <label>Distance (miles)</label>
          <input id="w-distance" type="number" placeholder="3.0" min="0" step="0.1">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input id="w-date" type="date">
        </div>
      </div>

      <!-- Individual set rows (strength only) -->
      <div id="set-rows-container" style="display:none; margin-bottom:14px;">
        <div id="set-rows"></div>
      </div>

      <button class="btn btn-blue" onclick="addWorkout()">Add Exercise</button>
    </div>

    <div class="card">
      <div class="card-title">Today's Session</div>
      <div id="today-workout"></div>
    </div>

    <div class="card">
      <div class="card-title">Recent History</div>
      <div id="workout-history"></div>
    </div>
  </div>

  <!-- ── BODY STATS ── -->
  <div id="tab-body" class="section">
    <div class="card">
      <div class="card-title">Log Body Stats</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Date</label>
          <input id="b-date" type="date">
        </div>
        <div class="form-group">
          <label>Weight (lbs)</label>
          <input id="b-weight" type="number" placeholder="175" min="0" step="0.1">
        </div>
        <div class="form-group">
          <label>Body Fat %</label>
          <input id="b-bf" type="number" placeholder="15" min="0" max="60" step="0.1">
        </div>
        <div class="form-group">
          <label>Waist (in)</label>
          <input id="b-waist" type="number" placeholder="32" min="0" step="0.5">
        </div>
        <div class="form-group">
          <label>Chest (in)</label>
          <input id="b-chest" type="number" placeholder="40" min="0" step="0.5">
        </div>
        <div class="form-group">
          <label>Arms (in)</label>
          <input id="b-arms" type="number" placeholder="15" min="0" step="0.5">
        </div>
      </div>
      <button class="btn btn-blue" onclick="addBodyStat()">Save Entry</button>
    </div>

    <div class="card">
      <div class="card-title">Latest Stats</div>
      <div id="body-latest" class="stats-row"></div>
    </div>

    <div class="card">
      <div class="card-title">History (last 10)</div>
      <div id="body-history"></div>
    </div>
  </div>

  <!-- ── NUTRITION ── -->
  <div id="tab-nutrition" class="section">
    <div class="card">
      <div class="card-title">Daily Goals</div>
      <div class="goals-row">
        <div class="form-group">
          <label>Calories</label>
          <input id="g-cal" type="number" placeholder="2000">
        </div>
        <div class="form-group">
          <label>Protein (g)</label>
          <input id="g-protein" type="number" placeholder="150">
        </div>
        <div class="form-group">
          <label>Carbs (g)</label>
          <input id="g-carbs" type="number" placeholder="200">
        </div>
        <div class="form-group">
          <label>Fat (g)</label>
          <input id="g-fat" type="number" placeholder="65">
        </div>
        <div class="form-group" style="align-self: flex-end">
          <button class="btn btn-blue" onclick="saveGoals()">Save Goals</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Today's Totals</div>
      <div id="nutrition-totals"></div>
    </div>

    <div class="card">
      <div class="card-title">Log Meal</div>
      <div class="form-grid">
        <div class="form-group" style="grid-column: span 2">
          <label>Meal Name</label>
          <input id="n-name" type="text" placeholder="e.g. Chicken & Rice">
        </div>
        <div class="form-group">
          <label>Calories</label>
          <input id="n-cal" type="number" placeholder="500" min="0">
        </div>
        <div class="form-group">
          <label>Protein (g)</label>
          <input id="n-protein" type="number" placeholder="40" min="0">
        </div>
        <div class="form-group">
          <label>Carbs (g)</label>
          <input id="n-carbs" type="number" placeholder="60" min="0">
        </div>
        <div class="form-group">
          <label>Fat (g)</label>
          <input id="n-fat" type="number" placeholder="10" min="0">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input id="n-date" type="date">
        </div>
      </div>
      <button class="btn btn-blue" onclick="addMeal()">Log Meal</button>
    </div>

    <div class="card">
      <div class="card-title">Today's Meals</div>
      <div id="meals-list"></div>
    </div>
  </div>

  <!-- ── PROGRESS ── -->
  <div id="tab-progress" class="section">
    <div class="card">
      <div class="card-title">Bodyweight — Last 30 Days</div>
      <div class="chart-wrap"><canvas id="chart-weight"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">Daily Calories — Last 30 Days</div>
      <div class="chart-wrap"><canvas id="chart-calories"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">Personal Records (Max Weight)</div>
      <div id="pr-board"></div>
    </div>
  </div>

</div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────
const today = () => new Date().toISOString().slice(0, 10);
const fmt = d => new Date(d + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'});
const load = k => JSON.parse(localStorage.getItem(k) || '[]');
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
const loadObj = k => JSON.parse(localStorage.getItem(k) || '{}');

// ── Init dates ────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  ['w-date','b-date','n-date'].forEach(id => { document.getElementById(id).value = today(); });
  renderCalendar();
  const goals = loadObj('ft-goals');
  if (goals.cal) {
    document.getElementById('g-cal').value = goals.cal;
    document.getElementById('g-protein').value = goals.protein;
    document.getElementById('g-carbs').value = goals.carbs;
    document.getElementById('g-fat').value = goals.fat;
  }
  renderWorkout(); renderBody(); renderNutrition();
});

// ── Tabs ──────────────────────────────────────────────────────────────────
let charts = {};
function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'progress') renderProgress();
}

// ── WORKOUT ───────────────────────────────────────────────────────────────
const CARDIO_EXERCISES = ['Treadmill','Elliptical','Bike','Stair Climber','Jump Rope'];

function toggleCustomExercise() {
  const sel = document.getElementById('w-name').value;
  const isCardio = CARDIO_EXERCISES.includes(sel);
  const isCustom = sel === '__custom__';

  document.getElementById('custom-exercise-group').style.display = isCustom ? 'block' : 'none';

  // Cardio fields
  document.getElementById('w-duration-group').style.display = isCardio ? 'block' : 'none';
  document.getElementById('w-distance-group').style.display = isCardio ? 'block' : 'none';

  // Strength fields
  document.getElementById('w-sets-group').style.display = isCardio ? 'none' : 'block';
  document.getElementById('w-sets-btn-group').style.display = isCardio ? 'none' : 'block';

  // Reset set rows when switching exercises
  document.getElementById('set-rows-container').style.display = 'none';
  document.getElementById('set-rows').innerHTML = '';
  document.getElementById('w-sets').value = '';
}

function buildSetRows() {
  const count = parseInt(document.getElementById('w-sets').value);
  if (!count || count < 1) { alert('Enter number of sets first.'); return; }
  const container = document.getElementById('set-rows');
  container.innerHTML = '';
  for (let i = 1; i <= count; i++) {
    container.innerHTML += `
      <div class="set-row">
        <span class="set-label">Set ${i}</span>
        <input type="number" id="set-reps-${i}" placeholder="Reps" min="1">
        <input type="number" id="set-weight-${i}" placeholder="lbs" min="0" step="0.5">
      </div>`;
  }
  document.getElementById('set-rows-container').style.display = 'block';
}

function addWorkout() {
  const sel = document.getElementById('w-name').value;
  const name = sel === '__custom__'
    ? document.getElementById('w-name-custom').value.trim()
    : sel.trim();
  const isCardio = CARDIO_EXERCISES.includes(sel);
  const date = document.getElementById('w-date').value;

  if (!name) { alert('Please select an exercise.'); return; }

  let entry = { name, date, id: Date.now(), isCardio };

  if (isCardio) {
    const duration = parseFloat(document.getElementById('w-duration').value) || null;
    const distance = parseFloat(document.getElementById('w-distance').value) || null;
    if (!duration) { alert('Please enter duration.'); return; }
    entry.duration = duration;
    entry.distance = distance;
  } else {
    const count = parseInt(document.getElementById('w-sets').value);
    if (!count) { alert('Enter number of sets and click Build Sets first.'); return; }
    const sets = [];
    for (let i = 1; i <= count; i++) {
      const reps = parseInt(document.getElementById(`set-reps-${i}`)?.value) || 0;
      const weight = parseFloat(document.getElementById(`set-weight-${i}`)?.value) || 0;
      sets.push({ set: i, reps, weight });
    }
    if (sets.every(s => !s.reps)) { alert('Fill in reps for at least one set.'); return; }
    entry.sets = sets;
  }

  const entries = load('ft-workouts');
  entries.push(entry);
  save('ft-workouts', entries);

  document.getElementById('w-name').value = '';
  document.getElementById('w-name-custom').value = '';
  document.getElementById('w-duration').value = '';
  document.getElementById('w-distance').value = '';
  document.getElementById('w-sets').value = '';
  document.getElementById('custom-exercise-group').style.display = 'none';
  document.getElementById('w-duration-group').style.display = 'none';
  document.getElementById('w-distance-group').style.display = 'none';
  document.getElementById('w-sets-group').style.display = 'block';
  document.getElementById('w-sets-btn-group').style.display = 'block';
  document.getElementById('set-rows-container').style.display = 'none';
  document.getElementById('set-rows').innerHTML = '';
  renderWorkout();
}

function deleteWorkout(id) {
  save('ft-workouts', load('ft-workouts').filter(e => e.id !== id));
  renderWorkout();
}

function renderWorkout() {
  const entries = load('ft-workouts');
  const td = today();
  const todayEntries = entries.filter(e => e.date === td);
  const pastEntries = entries.filter(e => e.date !== td);

  // Today
  const tw = document.getElementById('today-workout');
  if (todayEntries.length === 0) {
    tw.innerHTML = '<div class="empty">No exercises logged today yet.</div>';
  } else {
    tw.innerHTML = `<table><thead><tr><th>Exercise</th><th>Sets</th><th></th></tr></thead><tbody>
      ${todayEntries.map(e => `<tr>
        <td><strong>${e.name}</strong></td>
        <td style="color:var(--blue); font-size:0.8rem">${e.isCardio
          ? `${e.duration} min${e.distance ? ' · ' + e.distance + ' mi' : ''}`
          : (Array.isArray(e.sets)
              ? e.sets.map(s => `<span style="margin-right:8px">S${s.set}: ${s.reps}×${s.weight}lbs</span>`).join('')
              : `${e.sets}×${e.reps}${e.weight ? ' · ' + e.weight + ' lbs' : ''}`)
        }</td>
        <td><button class="btn btn-red" onclick="deleteWorkout(${e.id})">✕</button></td>
      </tr>`).join('')}
    </tbody></table>`;
  }

  // History grouped by date
  const wh = document.getElementById('workout-history');
  const grouped = {};
  pastEntries.forEach(e => { (grouped[e.date] = grouped[e.date] || []).push(e); });
  const dates = Object.keys(grouped).sort().reverse().slice(0, 7);
  if (dates.length === 0) {
    wh.innerHTML = '<div class="empty">No past sessions yet.</div>';
  } else {
    wh.innerHTML = dates.map(d => `
      <div style="margin-bottom:14px">
        <div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px;font-weight:600">${fmt(d)}</div>
        <table><thead><tr><th>Exercise</th><th>Details</th></tr></thead><tbody>
          ${grouped[d].map(e => `<tr>
            <td>${e.name}</td>
            <td style="color:var(--blue); font-size:0.8rem">${e.isCardio
              ? `${e.duration} min${e.distance ? ' · ' + e.distance + ' mi' : ''}`
              : (Array.isArray(e.sets)
                  ? e.sets.map(s => `<span style="margin-right:8px">S${s.set}: ${s.reps}×${s.weight}lbs</span>`).join('')
                  : `${e.sets}×${e.reps}${e.weight ? ' · ' + e.weight + ' lbs' : ''}`)
            }</td>
          </tr>`).join('')}
        </tbody></table>
      </div>`).join('');
  }
}

// ── BODY STATS ────────────────────────────────────────────────────────────
function addBodyStat() {
  const date = document.getElementById('b-date').value;
  const weight = parseFloat(document.getElementById('b-weight').value) || null;
  const bf = parseFloat(document.getElementById('b-bf').value) || null;
  const waist = parseFloat(document.getElementById('b-waist').value) || null;
  const chest = parseFloat(document.getElementById('b-chest').value) || null;
  const arms = parseFloat(document.getElementById('b-arms').value) || null;
  if (!weight && !bf) { alert('Enter at least weight or body fat %.'); return; }
  const entries = load('ft-body');
  entries.push({ date, weight, bf, waist, chest, arms, id: Date.now() });
  save('ft-body', entries);
  ['b-weight','b-bf','b-waist','b-chest','b-arms'].forEach(id => document.getElementById(id).value = '');
  renderBody();
}

function deleteBody(id) {
  save('ft-body', load('ft-body').filter(e => e.id !== id));
  renderBody();
}

function renderBody() {
  const entries = load('ft-body').sort((a,b) => b.date.localeCompare(a.date));
  const latest = entries[0];

  // Latest stats boxes
  const bl = document.getElementById('body-latest');
  if (!latest) {
    bl.innerHTML = '<div class="empty">No entries yet.</div>';
  } else {
    const boxes = [
      ['Weight', latest.weight ? latest.weight + ' lbs' : '—', '--blue'],
      ['Body Fat', latest.bf ? latest.bf + '%' : '—', '--green'],
      ['Waist', latest.waist ? latest.waist + '"' : '—', '--purple'],
      ['Chest', latest.chest ? latest.chest + '"' : '—', '--yellow'],
      ['Arms', latest.arms ? latest.arms + '"' : '—', '--red'],
    ];
    bl.innerHTML = boxes.map(([l,v,c]) => `<div class="stat-box"><div class="stat-lbl">${l}</div><div class="stat-val" style="color:var(${c})">${v}</div></div>`).join('');

  }

  // History table
  const bh = document.getElementById('body-history');
  if (entries.length === 0) {
    bh.innerHTML = '<div class="empty">No history yet.</div>';
  } else {
    bh.innerHTML = `<table><thead><tr><th>Date</th><th>Weight</th><th>BF%</th><th>Waist</th><th>Chest</th><th>Arms</th><th></th></tr></thead><tbody>
      ${entries.slice(0,10).map(e => `<tr>
        <td>${fmt(e.date)}</td>
        <td style="color:var(--blue)">${e.weight ?? '—'}</td>
        <td style="color:var(--green)">${e.bf ? e.bf+'%' : '—'}</td>
        <td>${e.waist ? e.waist+'"' : '—'}</td>
        <td>${e.chest ? e.chest+'"' : '—'}</td>
        <td>${e.arms ? e.arms+'"' : '—'}</td>
        <td><button class="btn btn-red" onclick="deleteBody(${e.id})">✕</button></td>
      </tr>`).join('')}
    </tbody></table>`;
  }
}

// ── NUTRITION ─────────────────────────────────────────────────────────────
function saveGoals() {
  save('ft-goals', {
    cal: parseInt(document.getElementById('g-cal').value) || 2000,
    protein: parseInt(document.getElementById('g-protein').value) || 150,
    carbs: parseInt(document.getElementById('g-carbs').value) || 200,
    fat: parseInt(document.getElementById('g-fat').value) || 65,
  });
  renderNutrition();
}

function addMeal() {
  const name = document.getElementById('n-name').value.trim();
  const cal = parseInt(document.getElementById('n-cal').value) || 0;
  const protein = parseInt(document.getElementById('n-protein').value) || 0;
  const carbs = parseInt(document.getElementById('n-carbs').value) || 0;
  const fat = parseInt(document.getElementById('n-fat').value) || 0;
  const date = document.getElementById('n-date').value;
  if (!name) { alert('Enter a meal name.'); return; }
  const meals = load('ft-meals');
  meals.push({ name, cal, protein, carbs, fat, date, id: Date.now() });
  save('ft-meals', meals);
  ['n-name','n-cal','n-protein','n-carbs','n-fat'].forEach(id => document.getElementById(id).value = '');
  renderNutrition();
}

function deleteMeal(id) {
  save('ft-meals', load('ft-meals').filter(e => e.id !== id));
  renderNutrition();
}

function renderNutrition() {
  const goals = loadObj('ft-goals');
  const g = { cal: goals.cal||2000, protein: goals.protein||150, carbs: goals.carbs||200, fat: goals.fat||65 };
  const meals = load('ft-meals');
  const todayMeals = meals.filter(m => m.date === today());

  const totals = todayMeals.reduce((a, m) => ({
    cal: a.cal + m.cal, protein: a.protein + m.protein,
    carbs: a.carbs + m.carbs, fat: a.fat + m.fat
  }), { cal:0, protein:0, carbs:0, fat:0 });

  const pct = (v, g) => Math.min(100, Math.round(v / g * 100));
  const clr = (v, g) => v > g ? 'var(--red)' : 'var(--green)';

  document.getElementById('nutrition-totals').innerHTML = `
    <div class="stats-row">
      <div class="stat-box"><div class="stat-lbl">Calories</div><div class="stat-val" style="color:var(--yellow)">${totals.cal}<span style="font-size:0.7rem;color:var(--muted)"> / ${g.cal}</span></div></div>
      <div class="stat-box"><div class="stat-lbl">Protein</div><div class="stat-val" style="color:var(--blue)">${totals.protein}g<span style="font-size:0.7rem;color:var(--muted)"> / ${g.protein}g</span></div></div>
      <div class="stat-box"><div class="stat-lbl">Carbs</div><div class="stat-val" style="color:var(--purple)">${totals.carbs}g<span style="font-size:0.7rem;color:var(--muted)"> / ${g.carbs}g</span></div></div>
      <div class="stat-box"><div class="stat-lbl">Fat</div><div class="stat-val" style="color:var(--red)">${totals.fat}g<span style="font-size:0.7rem;color:var(--g.fat)"> / ${g.fat}g</span></div></div>
    </div>
    ${[['Calories', totals.cal, g.cal, 'var(--yellow)'],['Protein', totals.protein, g.protein, 'var(--blue)'],['Carbs', totals.carbs, g.carbs, 'var(--purple)'],['Fat', totals.fat, g.fat, 'var(--red)']].map(([lbl,v,gv,c]) => `
      <div class="macro-row"><span class="macro-lbl">${lbl}</span><span style="font-size:0.78rem;color:${clr(v,gv)}">${pct(v,gv)}%</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct(v,gv)}%;background:${c}"></div></div>
    `).join('')}
  `;

  const ml = document.getElementById('meals-list');
  if (todayMeals.length === 0) {
    ml.innerHTML = '<div class="empty">No meals logged today yet.</div>';
  } else {
    ml.innerHTML = todayMeals.map(m => `
      <div class="meal-item">
        <div>
          <div class="meal-name">${m.name}</div>
          <div class="meal-macros">P: ${m.protein}g · C: ${m.carbs}g · F: ${m.fat}g</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="meal-cal">${m.cal} cal</span>
          <button class="btn btn-red" onclick="deleteMeal(${m.id})">✕</button>
        </div>
      </div>`).join('');
  }
}

// ── PROGRESS ──────────────────────────────────────────────────────────────
function renderProgress() {
  renderWeightChart();
  renderCalorieChart();
  renderPRBoard();
}

function renderWeightChart() {
  const entries = load('ft-body').sort((a,b) => a.date.localeCompare(b.date));
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  const filtered = entries.filter(e => e.weight && new Date(e.date) >= cutoff);
  const ctx = document.getElementById('chart-weight').getContext('2d');
  if (charts.weight) charts.weight.destroy();
  if (filtered.length === 0) {
    ctx.clearRect(0,0,300,220);
    ctx.fillStyle = '#64748b';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No bodyweight data yet', 150, 110);
    return;
  }
  charts.weight = new Chart(ctx, {
    type: 'line',
    data: {
      labels: filtered.map(e => fmt(e.date)),
      datasets: [{ label: 'Weight (lbs)', data: filtered.map(e => e.weight),
        borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.1)',
        tension: 0.3, fill: true, pointRadius: 4, pointBackgroundColor: '#60a5fa' }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 11 } }, grid: { color: '#1a1f2e' } },
        y: { ticks: { color: '#64748b', font: { size: 11 } }, grid: { color: '#2d3748' } }
      }
    }
  });
}

function renderCalorieChart() {
  const meals = load('ft-meals');
  const byDate = {};
  meals.forEach(m => { byDate[m.date] = (byDate[m.date] || 0) + m.cal; });
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  const dates = Object.keys(byDate).filter(d => new Date(d) >= cutoff).sort();
  const ctx = document.getElementById('chart-calories').getContext('2d');
  if (charts.cal) charts.cal.destroy();
  if (dates.length === 0) {
    ctx.clearRect(0,0,300,220);
    ctx.fillStyle = '#64748b';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No calorie data yet', 150, 110);
    return;
  }
  charts.cal = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: dates.map(fmt),
      datasets: [{ label: 'Calories', data: dates.map(d => byDate[d]),
        backgroundColor: 'rgba(251,191,36,0.7)', borderColor: '#fbbf24', borderWidth: 1, borderRadius: 4 }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 11 } }, grid: { color: '#1a1f2e' } },
        y: { ticks: { color: '#64748b', font: { size: 11 } }, grid: { color: '#2d3748' } }
      }
    }
  });
}

function renderPRBoard() {
  const entries = load('ft-workouts');
  const prs = {};
  entries.forEach(e => {
    if (e.weight && (!prs[e.name] || e.weight > prs[e.name])) prs[e.name] = e.weight;
  });
  const sorted = Object.entries(prs).sort((a,b) => b[1]-a[1]);
  const pb = document.getElementById('pr-board');
  if (sorted.length === 0) {
    pb.innerHTML = '<div class="empty">No workout data yet.</div>';
  } else {
    pb.innerHTML = sorted.map(([name, w], i) => `
      <div class="pr-item">
        <div><span style="color:var(--muted);margin-right:8px">#${i+1}</span><span class="pr-name">${name}</span></div>
        <div class="pr-weight">${w} lbs</div>
      </div>`).join('');
  }
}

// ── CALENDAR ──────────────────────────────────────────────────────────────
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function logRestDay() {
  const td = today();
  const restDays = load('ft-rest');
  if (restDays.includes(td)) {
    save('ft-rest', restDays.filter(d => d !== td));
  } else {
    restDays.push(td);
    save('ft-rest', restDays);
  }
  renderCalendar();
  renderWorkout();
}

function renderCalendar() {
  const todayStr = today();
  const workouts = load('ft-workouts');
  const workedDays = new Set(workouts.map(e => e.date));
  const restDays = new Set(load('ft-rest'));

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = `${monthNames[calMonth]} ${calYear}`;

  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = '<div class="cal-grid">';
  // Day headers
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    html += `<div class="cal-dow">${d}</div>`;
  });
  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const isPast = dateStr < todayStr;
    const didWork = workedDays.has(dateStr);

    let cls = 'cal-day';
    let icon = '';

    const isRest = restDays.has(dateStr);
    if (isPast || isToday) {
      if (didWork) {
        cls += ' did-workout';
        icon = '<div class="cal-icon">✓</div>';
      } else if (isRest) {
        cls += ' rest-day';
        icon = '<div class="cal-icon">R</div>';
      } else if (isPast) {
        cls += ' no-workout';
        icon = '<div class="cal-icon">✕</div>';
      }
    } else {
      cls += ' future';
    }
    if (isToday) cls += ' is-today';

    html += `<div class="${cls}"><div class="cal-num">${d}</div>${icon}</div>`;
  }
  html += '</div>';
  document.getElementById('calendar-grid').innerHTML = html;

  // Update rest day button label
  const restBtn = document.getElementById('rest-day-btn');
  if (restBtn) {
    const isRest = restDays.has(today());
    restBtn.innerHTML = isRest ? '<i class="fa-solid fa-xmark"></i> Remove Rest Day' : '<i class="fa-solid fa-bed"></i> Log Rest Day';
    restBtn.style.background = isRest ? 'rgba(248,113,113,0.12)' : 'rgba(96,165,250,0.12)';
    restBtn.style.borderColor = isRest ? 'rgba(248,113,113,0.3)' : 'rgba(96,165,250,0.3)';
    restBtn.style.color = isRest ? 'var(--red)' : 'var(--blue)';
  }

  // Update streak panel (workout OR rest day keeps streak alive)
  let streak = 0;
  const now = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    if (workedDays.has(ds) || restDays.has(ds)) streak++;
    else if (i > 0) break;
  }
  document.getElementById('streak-count').textContent = streak;
  const fireEl = document.getElementById('streak-fire');
  if (streak >= 3) fireEl.innerHTML = '<i class="fa-solid fa-fire" style="color:#ea580c;"></i>';
  else if (streak > 0) fireEl.innerHTML = '<i class="fa-solid fa-dumbbell" style="color:#ea580c;"></i>';
  else fireEl.innerHTML = '<i class="fa-solid fa-bed" style="color:var(--muted);"></i>';
}
